[package]
name = "test-capsule"
version = "0.0.0"
description = "Phase 1 JS/TS SDK vertical-slice test capsule."
authors = ["Joshua J. Bouw <dev@joshuajbouw.com>"]
astrid-version = ">=0.5.0"

[[component]]
id = "test-capsule"
file = "test-capsule.wasm"
type = "executable"

[capabilities]
kv = ["*"]

[publish]
"tool.v1.execute.*" = { wit = "opaque" }
"test.v1.event.*" = { wit = "opaque" }

# Interceptor binding: a [subscribe] entry's `handler` binds the topic to the
# guest handler (the key also grants the subscribe ACL).
[subscribe]
"test.v1.event" = { wit = "opaque", handler = "test.v1.event" }
